name: Android Build & Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: travelconnect-app
        run: flutter pub get

      - name: Run tests
        working-directory: travelconnect-app
        run: flutter test

      - name: Setup environment
        working-directory: travelconnect-app
        run: |
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > .env
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}" >> .env

      - name: Setup Android signing
        working-directory: travelconnect-app/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > upload-keystore.jks
          cat > key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=travelconnect
          storeFile=../upload-keystore.jks
          EOF

      - name: Setup Google Maps API key
        working-directory: travelconnect-app/android
        run: |
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}" >> gradle.properties

      - name: Build AAB
        working-directory: travelconnect-app
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: travelconnect-app/build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.travelconnect.app
          releaseFiles: travelconnect-app/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Cleanup signing files
        if: always()
        working-directory: travelconnect-app/android
        run: |
          rm -f upload-keystore.jks
          rm -f key.properties
